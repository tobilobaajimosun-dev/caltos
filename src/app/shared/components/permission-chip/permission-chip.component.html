<button class="chip" [class.active]="active" (click)="clicked.emit()">
  <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
    <path d="M2 6.5L4.5 9L10 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>
  <span>{{ label }}</span>
  @if (removable) {
    <button class="remove" (click)="$event.stopPropagation(); removed.emit()">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M2 2L8 8M8 2L2 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </button>
  }
</button>
