<div class="toast" [class]="type">
  <div class="strip"></div>
  <div class="icon-wrap">
    @if (type === 'success') {
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="11" fill="rgba(52,199,89,0.2)"/>
        <path d="M6.5 11.5L9.5 14.5L15.5 8" stroke="#34C759" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    } @else {
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="11" fill="rgba(255,59,48,0.2)"/>
        <path d="M7.5 7.5L14.5 14.5M14.5 7.5L7.5 14.5" stroke="#FF3B30" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    }
  </div>
  <div class="content">
    <p class="title">{{ title }}</p>
    <p class="message">{{ message }}</p>
  </div>
  <button class="close" (click)="dismissed.emit()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M4 4L12 12M12 4L4 12" stroke="#8A93A6" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </button>
</div>
