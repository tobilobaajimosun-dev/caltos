<button class="org-profile" (click)="clicked.emit()">
  <span class="avatar" [style.background]="avatarColor">{{ avatarLetter }}</span>
  @if (!iconOnly) {
    <div class="info">
      <span class="org-name">{{ orgName }}</span>
      <span class="role-badge">{{ role }}</span>
    </div>
    <div class="chevrons">
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
        <path d="M1 5L5 1l4 4" stroke="#44444B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none">
        <path d="M1 1L5 5l4-4" stroke="#44444B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
  }
</button>
