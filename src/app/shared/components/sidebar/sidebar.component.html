@if (sidebarState.mobileOpen()) {
  <div class="sidebar-backdrop" (click)="sidebarState.close()"></div>
}

<nav class="sidebar" [class.collapsed]="collapsed" [class.mobile-open]="sidebarState.mobileOpen()">

  <div class="sidebar-top">
    <app-org-profile
      [orgName]="orgName"
      avatarLetter="P"
      avatarColor="#E55A2B"
      role="ADMIN"
      [accountNumber]="account.accountNumber()"
      [iconOnly]="collapsed"
      (clicked)="switchOrgOpen.set(true)"
    />
    <button class="collapse-btn" (click)="collapsed = !collapsed" [title]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" [class.flipped]="collapsed">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="nav-list">
    @for (item of navItems; track item.id) {
      <app-nav-item
        [label]="item.label"
        [icon]="item.icon"
        [active]="isActive(item)"
        [hasDropdown]="item.hasDropdown ?? false"
        [expanded]="isExpanded(item.id)"
        [iconOnly]="collapsed"
        (clicked)="navigate(item)"
      />
      @if (item.hasDropdown && item.children && isExpanded(item.id) && !collapsed) {
        <div class="nav-children">
          @for (child of item.children; track child.label) {
            <button class="nav-child" type="button" (click)="navigateChild(child)">{{ child.label }}</button>
          }
        </div>
      }
    }
  </div>

  <div class="sidebar-bottom">
    @if (!collapsed) {
      <div class="theme-toggle">
        <span>Dark mode</span>
        <app-toggle [checked]="theme.isDark()" (checkedChange)="theme.set($event)" />
      </div>
      <app-badge-card />
    }
  </div>

</nav>

<app-modal [isOpen]="switchOrgOpen()" title="Switch organization" (closed)="switchOrgOpen.set(false)">
  <div class="org-switch-list">
    @for (org of orgs; track org.id) {
      <button type="button" class="org-switch-item" [class.active]="org.name === orgName" (click)="selectOrg(org)">
        <span class="org-switch-avatar" [style.background]="org.color">{{ org.name[0] }}</span>
        <span class="org-switch-name">{{ org.name }}</span>
        @if (org.name === orgName) {
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M20 6 9 17l-5-5" stroke="var(--color-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        }
      </button>
    }
    <button type="button" class="org-switch-add">+ Add organization</button>
  </div>
</app-modal>
