<div class="inline-file">
  <div class="left">
    <div class="file-icon" [attr.data-type]="fileType">
      <span class="file-ext">{{ fileType.toUpperCase() }}</span>
    </div>
    <div class="file-info">
      <a class="file-name" href="#" (click)="$event.preventDefault(); viewed.emit()">{{ fileName }}</a>
      <p class="upload-date">Uploaded: {{ uploadDate }}</p>
    </div>
  </div>
  <button class="view-btn" (click)="viewed.emit()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M1.33 8C1.33 8 3.33 3.33 8 3.33C12.67 3.33 14.67 8 14.67 8C14.67 8 12.67 12.67 8 12.67C3.33 12.67 1.33 8 1.33 8Z" stroke="#44444B" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="8" cy="8" r="1.5" stroke="#44444B" stroke-width="1.3"/>
    </svg>
    View
  </button>
</div>
