<div class="file-upload">
  @if (label) {
    <p class="upload-label">{{ label }}</p>
  }

  <div class="upload-area">
    <div
      class="drop-zone"
      [class.drag-over]="isDragOver"
      (click)="onZoneClick()"
      (dragover)="onDragOver($event)"
      (dragleave)="onDragLeave()"
      (drop)="onDrop($event)"
      role="button"
      tabindex="0"
      (keydown.enter)="onZoneClick()"
    >
      @if (previewUrl) {
        <img class="drop-preview" [src]="previewUrl" [alt]="selectedFile?.name ?? 'Uploaded image preview'" />
      } @else {
        <hugeicons-icon [icon]="uploadIcon" size="28" [strokeWidth]="1.5" color="#0053A6" />
      }
      <div class="drop-text">
        <p class="drop-title">Drag and drop here or click to upload</p>
        <p class="drop-subtitle">You can upload .jpeg, .png or pdf files</p>
      </div>
    </div>

    <div class="file-row">
      <span class="file-name" [class.has-file]="selectedFile || isInitialPreview">
        {{ selectedFile ? selectedFile.name : (isInitialPreview ? 'Previously uploaded image' : 'No file uploaded') }}
      </span>
      @if (selectedFile || isInitialPreview) {
        <button class="remove-btn" (click)="removeFile()" aria-label="Remove file">
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <path d="M3.33 5.83H16.67M8.33 9.17V14.17M11.67 9.17V14.17M4.17 5.83L5 15.83C5 16.75 5.75 17.5 6.67 17.5H13.33C14.25 17.5 15 16.75 15 15.83L15.83 5.83M7.5 5.83V3.33C7.5 2.87 7.87 2.5 8.33 2.5H11.67C12.13 2.5 12.5 2.87 12.5 3.33V5.83" stroke="#8A93A6" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      }
    </div>
  </div>

  <input
    #fileInput
    type="file"
    [accept]="accept"
    class="hidden-input"
    (change)="onFileChange($event)"
  />
</div>
