<app-modal [isOpen]="isOpen" title="Upload  manual repayment" (closed)="onClose()">
  <div class="upload-modal-body">
    <p class="subtitle">Manually add a repayment done outside of the system.</p>

    <form class="form" (ngSubmit)="onSubmit()" #repaymentForm="ngForm">
      <div class="field">
        <label for="amount">Amount repaid</label>
        <div class="input-wrap currency">
          <span class="prefix">₦</span>
          <input
            id="amount"
            type="text"
            placeholder="Kindly input amount paid by customer"
            [(ngModel)]="amount"
            name="amount"
          />
        </div>
      </div>

      <div class="field">
        <label for="channel">What channel was payment made via</label>
        <div class="input-wrap select">
          <input
            id="channel"
            type="text"
            placeholder="Select repayment/collection method"
            [(ngModel)]="channel"
            name="channel"
          />
          <svg class="trailing-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M5 7.5L10 12.5L15 7.5" stroke="#44444B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <div class="field">
        <label for="date">What date was payment made</label>
        <div class="input-wrap calendar">
          <input
            id="date"
            type="date"
            [(ngModel)]="date"
            name="date"
          />
          <svg class="trailing-icon" width="20" height="20" viewBox="0 0 20 20" fill="none">
            <rect x="2.5" y="4.5" width="15" height="13" rx="2" stroke="#44444B" stroke-width="1.5"/>
            <path d="M2.5 8.5H17.5" stroke="#44444B" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M6.5 2.5V5.5M13.5 2.5V5.5" stroke="#44444B" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <app-file-upload
        label="Upload proof of payment"
        (fileSelected)="file = $event"
      />

      <button type="submit" class="submit-btn" [class.active]="isValid" [disabled]="!isValid">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 2.25V12.75M9 2.25L5.25 6M9 2.25L12.75 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M2.25 14.25H15.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Upload manual repayment
      </button>
    </form>
  </div>
</app-modal>
