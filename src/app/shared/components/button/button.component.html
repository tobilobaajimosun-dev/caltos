<button
  class="btn"
  [ngClass]="variant"
  [class.active]="active"
  [class.dark]="dark"
  [disabled]="disabled"
  (click)="!disabled && clicked.emit()">

  @if (variant === 'back') {
    <hi-icon [icon]="backIcon" size="16" color="currentColor" />
  }

  @if (variant === 'filter') {
    <hi-icon [icon]="filterIcon" size="14" color="currentColor" />
  }

  @if (variant === 'primary' || variant === 'dropdown') {
    <hi-icon [icon]="userIcon" size="16" color="currentColor" />
  }

  @if (variant === 'round') {
    <hi-icon [icon]="refreshIcon" size="16" color="currentColor" />
  }

  @if (variant !== 'round') {
    <span class="label-text">{{ label }}</span>
  }

  @if (variant === 'secondary' || variant === 'dropdown') {
    <hi-icon [icon]="chevronRightIcon" size="14" color="currentColor" />
  }
</button>
