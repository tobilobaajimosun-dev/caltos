<button
  class="btn"
  [ngClass]="variant"
  [class.active]="active"
  [class.dark]="dark"
  [class.full-width]="fullWidth"
  [disabled]="disabled"
  (click)="!disabled && clicked.emit()">

  @if (variant === 'back') {
    <hi-icon [icon]="backIcon" size="16" color="currentColor" />
  }

  @if (variant === 'filter') {
    <hi-icon [icon]="filterIcon" size="14" color="currentColor" />
  }

  @if ((variant === 'primary' || variant === 'dropdown' || variant === 'outline' || variant === 'secondary') && icon) {
    <hi-icon [icon]="icon" size="16" color="currentColor" />
  }

  @if (variant === 'round') {
    <hi-icon [icon]="roundIcon" size="16" color="currentColor" />
  }

  @if (variant !== 'round') {
    <span class="label-text">{{ label }}</span>
  }

  @if (variant === 'secondary' || variant === 'dropdown') {
    <hi-icon [icon]="chevronRightIcon" size="14" color="currentColor" />
  }
</button>
