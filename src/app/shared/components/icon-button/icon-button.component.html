<button class="icon-btn" [ngClass]="[icon, color]" [class.filled]="filled" (click)="clicked.emit()">
  @switch (icon) {
    @case ('edit') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M9.5 2L12 4.5L4.5 12H2V9.5L9.5 2Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    @case ('edit-open') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M6 3H3a1 1 0 00-1 1v7a1 1 0 001 1h7a1 1 0 001-1V8M8 2h4v4M12 2L6.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    @case ('check') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 7.5L5.5 11L12 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    @case ('close') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M3 3L11 11M11 3L3 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    }
    @case ('delete') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 4h10M5 4V2.5h4V4M3 4l.5 7.5h7L11 4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    @case ('more') {
      <svg width="16" height="4" viewBox="0 0 16 4" fill="none">
        <circle cx="2" cy="2" r="1.5" fill="currentColor"/>
        <circle cx="8" cy="2" r="1.5" fill="currentColor"/>
        <circle cx="14" cy="2" r="1.5" fill="currentColor"/>
      </svg>
    }
    @case ('info') {
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.3"/>
        <path d="M8 7v4M8 5.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    }
    @case ('view') {
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
      </svg>
    }
    @case ('expand') {
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M2 2h4M2 2v4M12 2H8M12 2v4M2 12h4M2 12V8M12 12H8M12 12V8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
  }
  @if (label) {
    <span class="lbl">{{ label }}</span>
  }
</button>
