<div class="tabs" role="tablist">
  @for (tab of tabs(); track tab.id) {
    <button
      class="tab"
      role="tab"
      type="button"
      [class.active]="activeTab() === tab.id"
      [attr.aria-selected]="activeTab() === tab.id"
      (click)="activeTabChange.emit(tab.id)"
    >{{ tab.label }}</button>
  }
</div>
