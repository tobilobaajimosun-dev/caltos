<label class="checkbox-wrap" [class.has-label]="label" (click)="toggle()">
  <span
    class="box"
    [class.checked]="checked"
    [class.round]="variant === 'round'"
    role="checkbox"
    [attr.aria-checked]="checked">
    @if (checked) {
      <svg width="13" height="10" viewBox="0 0 13 10" fill="none">
        <path d="M1 5L4.5 8.5L11.5 1.5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
  </span>
  @if (label) {
    <span class="label" [class.checked]="checked">{{ label }}</span>
  }
</label>
