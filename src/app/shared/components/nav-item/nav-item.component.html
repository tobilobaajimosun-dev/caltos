@if (iconOnly) {
  <app-tooltip [text]="label" position="right" class="nav-item-tooltip-host">
    <button
      class="nav-item"
      [class.active]="active"
      [class.icon-only]="iconOnly"
      [class.primary-text]="variant === 'primary-text'"
      (click)="onClick()">
      @if (icon !== 'none') {
        <span class="icon-slot">
          <hugeicons-icon [icon]="iconMap[icon]" size="16" [strokeWidth]="1.5" color="currentColor" />
        </span>
      }
    </button>
  </app-tooltip>
} @else {
  <button
    class="nav-item"
    [class.active]="active"
    [class.primary-text]="variant === 'primary-text'"
    (click)="onClick()">

    @if (icon !== 'none') {
      <span class="icon-slot">
        <hugeicons-icon [icon]="iconMap[icon]" size="16" [strokeWidth]="1.5" color="currentColor" />
      </span>
    }

    <span class="label-text">{{ label }}</span>

    @if (hasDropdown) {
      <hugeicons-icon
        class="chevron"
        [class.open]="expanded"
        [icon]="chevronIcon"
        size="14"
        [strokeWidth]="1.5"
        color="currentColor" />
    }
  </button>
}
