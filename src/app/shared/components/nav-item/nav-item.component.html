<button
  class="nav-item"
  [class.active]="active"
  [class.primary-text]="variant === 'primary-text'"
  (click)="onClick()">

  @if (icon !== 'none') {
    <span class="icon-slot">
      @switch (icon) {
        @case ('dashboard') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="9.5" y="1.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="1.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
            <rect x="9.5" y="9.5" width="5" height="5" rx="1" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        }
        @case ('home') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 7L8 2l6 5v7H2V7z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <rect x="6" y="10" width="4" height="4" rx=".5" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        }
        @case ('customers') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 8a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-4.5 5.5a4.5 4.5 0 019 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
        @case ('wallet') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="1.5" y="4" width="13" height="10" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M1.5 7h13M10.5 10h2" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M4 4V3a1 1 0 011-1h6a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        }
        @case ('products') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13 5.5L8 2.5 3 5.5V10.5L8 13.5 13 10.5V5.5Z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 2.5V8M3 5.5L8 8M13 5.5L8 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        }
        @case ('loans') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M2 14V9a6 6 0 0112 0v5M2 14h12" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M8 9v3M6.5 10.5h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        }
        @case ('reports') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M5 10.5L7 8l2 2 3-3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
        @case ('risk') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M8 2L2 14h12L8 2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M8 7v3M8 11.5v.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        }
        @case ('teams') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M6 7a2 2 0 100-4 2 2 0 000 4zm-3.5 6a3.5 3.5 0 017 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M10.5 4.5a1.5 1.5 0 110 3M13.5 13a3 3 0 00-3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        }
        @case ('settings') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.3"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.05 3.05l1.41 1.41M11.54 11.54l1.41 1.41M3.05 12.95l1.41-1.41M11.54 4.46l1.41-1.41" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        }
        @case ('quick-action') {
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M9 2L3 9h5l-1 5 6-7H8L9 2z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        }
      }
    </span>
  }

  <span class="label-text">{{ label }}</span>

  @if (hasDropdown) {
    <svg class="chevron" [class.open]="expanded" width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M4 5.5L7 8.5l3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  }
</button>
