<button
  class="nav-item"
  [class.active]="active"
  [class.primary-text]="variant === 'primary-text'"
  (click)="onClick()">

  @if (icon !== 'none') {
    <span class="icon-slot">
      <hugeicons-icon [icon]="iconMap[icon]" size="16" color="currentColor" />
    </span>
  }

  <span class="label-text">{{ label }}</span>

  @if (hasDropdown) {
    <hugeicons-icon
      class="chevron"
      [class.open]="expanded"
      [icon]="chevronIcon"
      size="14"
      color="currentColor" />
  }
</button>
