@if (label) {
  <label class="label">{{ label }}</label>
}
<div class="input-wrap">
  @if (prefix) {
    <span class="input-affix input-affix-prefix">{{ prefix }}</span>
  }
  <input
    class="input"
    [class.focused]="focused"
    [class.has-prefix]="!!prefix"
    [class.has-suffix]="!!suffix"
    [type]="effectiveType"
    [inputMode]="commaFormat ? 'numeric' : null"
    [placeholder]="placeholder"
    [value]="displayValue"
    [disabled]="disabled"
    (input)="onInput($event)"
    (focus)="focused = true"
    (blur)="focused = false"
  />
  @if (suffix) {
    <span class="input-affix input-affix-suffix">{{ suffix }}</span>
  }
</div>
