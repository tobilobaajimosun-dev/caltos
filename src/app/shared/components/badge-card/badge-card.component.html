<div class="badge-card">
  <div class="icon">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <circle cx="10" cy="10" r="9" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <path d="M10 9v5M10 7v.5" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="body">
    <p class="title">{{ title }}</p>
    <p class="description">{{ description }}</p>
  </div>
  <button class="arrow" (click)="actioned.emit()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
      <path d="M3 8H13M13 8L9 4M13 8L9 12" stroke="rgba(255,255,255,0.65)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>
</div>
