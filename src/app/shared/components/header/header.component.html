<header class="app-header">

  <div class="header-left">
    <button class="hamburger" type="button" aria-label="Toggle navigation" (click)="sidebarState.toggle()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <div class="header-center">
    <button class="search-trigger" type="button" (click)="commandPaletteOpen.set(true)">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none">
        <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="1.5"/>
        <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span class="search-placeholder">Search customers, loans, products...</span>
      <kbd class="search-kbd">⌘K</kbd>
    </button>
  </div>

  <div class="header-right">
    <button class="icon-btn" type="button" aria-label="Toggle dark mode" (click)="theme.toggle()">
      @if (theme.isDark()) {
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M12 3v2M12 19v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M3 12h2M19 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="1.5"/></svg>
      } @else {
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M21 12.5A9 9 0 1 1 11.5 3a7 7 0 0 0 9.5 9.5Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      }
    </button>

    <div class="menu-wrap">
      <button class="icon-btn" type="button" aria-label="Help" (click)="toggleHelpMenu()">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M9.5 9a2.5 2.5 0 1 1 3.7 2.2c-.7.4-1.2 1-1.2 1.8v.3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="17" r="1" fill="currentColor"/></svg>
      </button>
      @if (helpMenuOpen()) {
        <div class="dropdown help-dropdown">
          <button class="dropdown-item">Documentation</button>
          <button class="dropdown-item">Contact support</button>
          <button class="dropdown-item">Keyboard shortcuts</button>
        </div>
      }
    </div>

    <button class="icon-btn" type="button" aria-label="Notifications" (click)="toggleNotificationPanel()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9M13.73 21a2 2 0 0 1-3.46 0" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      @if (notifications.unreadCount() > 0) {
        <span class="badge">{{ notifications.unreadCount() }}</span>
      }
    </button>

    <app-button variant="secondary" label="Give a loan" (clicked)="giveLoan()" />

    <span class="balance-pill">
      <span class="balance-pill-label">Wallet balance</span>
      <span class="balance-pill-value">{{ account.balance() }}</span>
    </span>

    <div class="menu-wrap">
      <button class="user-trigger" type="button" (click)="toggleUserMenu()">
        <app-avatar [name]="userName" size="sm" />
      </button>
      @if (userMenuOpen()) {
        <div class="dropdown user-dropdown">
          <div class="user-info">
            <p class="user-name">{{ userName }}</p>
            <p class="user-email">{{ userEmail }}</p>
          </div>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item">My Profile</button>
          <button class="dropdown-item">Keyboard shortcuts</button>
          <div class="dropdown-divider"></div>
          <button class="dropdown-item" (click)="simulateSessionExpiry()">Simulate session expiry (demo)</button>
          <button class="dropdown-item sign-out" (click)="signOut()">Sign out</button>
        </div>
      }
    </div>
  </div>

  @if (helpMenuOpen() || userMenuOpen()) {
    <div class="menu-backdrop" (click)="closeMenus()"></div>
  }
</header>

<app-command-palette
  [isOpen]="commandPaletteOpen()"
  [groups]="commandGroups"
  (closed)="commandPaletteOpen.set(false)"
  (selected)="onCommandSelected($event)"
/>

<app-notification-panel [isOpen]="notificationPanelOpen()" (closed)="notificationPanelOpen.set(false)" />
