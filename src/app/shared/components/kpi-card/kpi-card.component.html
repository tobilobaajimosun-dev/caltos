<div class="kpi-card">
  <div class="kpi-label-row">
    <p class="kpi-label">{{ label }}</p>
    @if (tooltip) {
      <app-tooltip [text]="tooltip" position="bottom">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" class="kpi-info-icon">
          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
          <path d="M12 11v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="12" cy="8" r="1" fill="currentColor"/>
        </svg>
      </app-tooltip>
    }
  </div>
  <p class="kpi-value">{{ value }}</p>
  @if (subtitle) {
    <p class="kpi-subtitle">{{ subtitle }}</p>
  }
</div>
