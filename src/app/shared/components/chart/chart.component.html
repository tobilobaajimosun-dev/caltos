<div class="chart-wrap">
  <svg #svgRef class="chart" [attr.viewBox]="viewBox" preserveAspectRatio="none" role="img" [attr.aria-label]="type() + ' chart'"
    (mousemove)="onMouseMove($event)" (mouseleave)="onMouseLeave()">

    <!-- Mercury line charts have no gridlines — just a hairline baseline -->
    @if (type() !== 'line') {
      @for (gy of gridlines(); track gy) {
        <line class="gridline" [attr.x1]="24" [attr.x2]="chartWidth - 24" [attr.y1]="gy" [attr.y2]="gy" />
      }
    } @else {
      <line class="baseline" [attr.x1]="24" [attr.x2]="chartWidth - 24" [attr.y1]="baselineY" [attr.y2]="baselineY" />
    }

    @if (hoveredIndex() !== null) {
      <line class="hover-guide" [attr.x1]="labelPositions()[hoveredIndex()!]?.x" [attr.x2]="labelPositions()[hoveredIndex()!]?.x" y1="24" [attr.y2]="chartHeight - 40" />
    }

    @switch (type()) {
      @case ('line') {
        <!-- Mercury style: gradient area fill under a smooth curve, point only on hover -->
        <defs>
          <linearGradient [attr.id]="gradientId" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" [style.stop-color]="color()" stop-opacity="0.18" />
            <stop offset="100%" [style.stop-color]="color()" stop-opacity="0" />
          </linearGradient>
        </defs>
        @if (lineAreaPath()) {
          <path [attr.d]="lineAreaPath()" [attr.fill]="'url(#' + gradientId + ')'" stroke="none" />
        }
        <path [attr.d]="linePath()" fill="none" [attr.stroke]="color()" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
        @for (p of points(); track p.label; let i = $index) {
          @if (hoveredIndex() === i) {
            <circle [attr.cx]="p.x" [attr.cy]="p.y" r="4.5" [attr.fill]="color()" class="point hovered" stroke="var(--surface-base)" stroke-width="2" />
          }
        }
      }
      @case ('grouped-bar') {
        @for (b of groupedBars(); track b.x) {
          <rect [attr.x]="b.x" [attr.y]="b.y" [attr.width]="b.width" [attr.height]="b.height" [attr.fill]="b.color" rx="2" class="bar" />
        }
      }
      @case ('area') {
        @for (layer of areaLayers(); track layer.name) {
          <path [attr.d]="layer.path" [attr.fill]="layer.color" fill-opacity="0.75" stroke="none" />
        }
      }
      @default {
        @for (b of bars(); track b.label; let i = $index) {
          <rect [attr.x]="b.x" [attr.y]="b.y" [attr.width]="b.width" [attr.height]="b.height" [attr.fill]="color()" rx="3" class="bar" [class.hovered]="hoveredIndex() === i" />
        }
      }
    }

    @for (lp of labelPositions(); track lp.label) {
      <text class="axis-label" [attr.x]="lp.x" [attr.y]="chartHeight - 6" text-anchor="middle">{{ lp.label }}</text>
    }
  </svg>

  @if (hoveredIndex() !== null && tooltipRows().length) {
    <div class="chart-tooltip" [style.left.%]="tooltipLeftPct()">
      <div class="chart-tooltip-label">{{ tooltipLabel() }}</div>
      @for (row of tooltipRows(); track row.name) {
        <div class="chart-tooltip-row">
          <span class="chart-tooltip-dot" [style.background]="row.color"></span>
          <span class="chart-tooltip-name">{{ row.name }}</span>
          <span class="chart-tooltip-value">{{ row.value.toLocaleString() }}</span>
        </div>
      }
    </div>
  }
</div>
