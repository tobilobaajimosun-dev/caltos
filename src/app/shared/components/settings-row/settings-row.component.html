<div class="row" [class.editing]="editing">
  <div class="left">
    @if (type === 'email') {
      <svg class="row-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="1.5" y="3.5" width="13" height="9" rx="1.5" stroke="#8A93A6" stroke-width="1.3"/>
        <path d="M1.5 5L8 9l6.5-4" stroke="#8A93A6" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    } @else if (type === 'text' || type === 'toggle') {
      <svg class="row-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 8a2.5 2.5 0 100-5 2.5 2.5 0 000 5zm-4.5 5.5a4.5 4.5 0 019 0" stroke="#8A93A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    }
    <div class="left-text">
      <span class="row-label">{{ label }}</span>
      @if (subtitle) {
        <span class="row-subtitle">{{ subtitle }}</span>
      }
    </div>
  </div>

  <div class="center">
    @if (type === 'color' && !editing) {
      <span class="color-swatch" [style.background]="value"></span>
    }
    @if (editing) {
      <input class="edit-input" [(ngModel)]="editValue" [placeholder]="value" />
    } @else {
      <span class="value-text">{{ value }}</span>
    }
  </div>

  <div class="right">
    @if (type === 'toggle') {
      <button class="edit-icon" (click)="editing ? save() : startEdit()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L12 5L4.5 12.5H2V10L9 2Z" stroke="#8A93A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <div class="toggle-wrap">
        <span class="toggle-pill" [class.on]="toggled" (click)="toggleChange.emit(!toggled)">
          <span class="thumb"></span>
        </span>
      </div>
    } @else if (editing) {
      <button class="action-btn check" (click)="save()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7.5L5.5 11L12 3" stroke="#34C759" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="action-btn cancel" (click)="cancel()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 3L11 11M11 3L3 11" stroke="#FF3B30" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    } @else {
      <button class="edit-icon" (click)="startEdit()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M9 2L12 5L4.5 12.5H2V10L9 2Z" stroke="#8A93A6" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    }
  </div>
</div>
