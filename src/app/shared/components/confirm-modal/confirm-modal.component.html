<app-modal [isOpen]="isOpen()" [title]="title()" size="sm" (closed)="cancelled.emit()">
  @if (message()) {
    <p class="confirm-message">{{ message() }}</p>
  }
  <div modalFooter class="confirm-actions">
    <app-button variant="outline" [label]="cancelLabel()" (clicked)="cancelled.emit()" />
    <span [class.danger]="danger()">
      <app-button variant="primary" [label]="confirmLabel()" (clicked)="confirmed.emit()" />
    </span>
  </div>
</app-modal>
