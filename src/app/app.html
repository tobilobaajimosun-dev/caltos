<div class="showcase">
  <h2 class="section-title">KPI Cards</h2>
  <div class="row">
    <app-kpi-card label="Total number of payouts (Daily)" value="0" />
    <app-kpi-card label="Total disbursed (Monthly)" value="₦4.2M" />
    <app-kpi-card label="Active Loans" value="128" />
    <app-kpi-card label="Overdue" value="14" />
  </div>

  <h2 class="section-title">Round Tabs</h2>
  <app-round-tabs [tabs]="tabs" [(activeTab)]="activeTab" />
  <p class="hint">Active: {{ activeTab }}</p>

  <h2 class="section-title">Pagination</h2>
  <app-pagination
    [currentPage]="currentPage"
    [totalPages]="6"
    [pageSize]="pageSize"
    (pageChange)="currentPage = $event"
    (pageSizeChange)="pageSize = $event"
  />

  <h2 class="section-title">Inline File</h2>
  <app-inline-file
    fileName="Repayment proof.pdf"
    fileType="pdf"
    uploadDate="Aug 29, 2024, 3:52:12 PM GMT"
  />
  <app-inline-file
    fileName="Customer video.mp4"
    fileType="mp4"
    uploadDate="Jun 10, 2025, 11:00:00 AM GMT"
  />

  <h2 class="section-title">File Upload</h2>
  <div class="upload-demo">
    <app-file-upload label="Upload proof of payment" />
  </div>

  <h2 class="section-title">Modals</h2>
  <div class="row">
    <button class="demo-btn" (click)="showModal = true">Open Generic Modal</button>
    <button class="demo-btn" (click)="showUploadModal = true">Open Upload Modal</button>
  </div>
</div>

<app-modal
  [isOpen]="showModal"
  title="Mandatory Two-Factor Authentication Required!"
  (closed)="showModal = false"
>
  <div class="modal-demo-content">
    <p class="modal-demo-text">
      Use Google Authenticator, One Password, Twillio or any other 2FA app
      to scan the QR code below or use the set up key below.
    </p>
    <div class="qr-placeholder">QR Code</div>
  </div>
</app-modal>

<app-upload-modal
  [isOpen]="showUploadModal"
  (closed)="showUploadModal = false"
  (submitted)="showUploadModal = false"
/>
