@if (loading) {
  <div class="apply-loading" aria-busy="true"></div>
} @else if (useV2Flow) {
  <app-apply-flow-v2 [product]="product" [productId]="resolvedProductId" [orgLogoDataUrl]="orgLogoDataUrl" />
} @else {
  <app-apply-profile-flow [product]="product" [productId]="resolvedProductId" [orgLogoDataUrl]="orgLogoDataUrl" />
}
