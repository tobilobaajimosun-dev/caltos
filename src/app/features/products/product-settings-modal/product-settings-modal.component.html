<app-modal [isOpen]="isOpen" title="Settings" size="lg" (closed)="close()">
  <div class="settings-body">
    <div class="section-intro">
      <h3 class="section-title">Notification Templates</h3>
      <p class="section-sub">SMS and email copy sent to borrowers at each loan lifecycle event.</p>
    </div>
    <div class="notif-list">
      @for (t of notificationTemplates; track t.event) {
        <div class="notif-row">
          <div class="notif-info">
            <p class="notif-event">{{ t.event }}</p>
            <p class="notif-meta">{{ t.channel }} · Last edited {{ t.lastEdited }}</p>
          </div>
          <app-button variant="outline" label="Edit" />
        </div>
      }
    </div>
  </div>
</app-modal>
