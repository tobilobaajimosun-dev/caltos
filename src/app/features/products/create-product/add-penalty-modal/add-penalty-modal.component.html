@if (isOpen) {
<div class="backdrop" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-head">
      <h2 class="modal-title">Add new penalty</h2>
      <button class="close-btn" (click)="close()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15 5L5 15M5 5l10 10" stroke="#44444B" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <p class="modal-sub">Add your own custom fees to this loan product.</p>

    <div class="form-stack">
      <div class="field">
        <label>Penalty name</label>
        <input [(ngModel)]="name" placeholder="e.g. Late Payment" />
      </div>

      <div class="field-row">
        <div class="field">
          <label>Penalty method</label>
          <select [(ngModel)]="method">
            <option>Percentage</option>
            <option>Fixed amount</option>
          </select>
        </div>
        <div class="field">
          <label>{{ method === 'Percentage' ? 'Percentage' : 'Amount' }}</label>
          <input [(ngModel)]="value" [placeholder]="method === 'Percentage' ? '1.5%' : '₦600'" />
        </div>
      </div>

      @if (method === 'Percentage') {
        <div class="field-row">
          <div class="field">
            <label>Minimum Amount</label>
            <input [(ngModel)]="minAmount" placeholder="₦0.00" />
          </div>
          <div class="field">
            <label>Maximum Amount</label>
            <input [(ngModel)]="maxAmount" placeholder="₦0.00" />
          </div>
        </div>
      }

      <div class="field-row">
        <div class="field">
          <label>Penalty kicks in after</label>
          <input [(ngModel)]="kicksInAfter" placeholder="e.g. 3" />
          <div class="unit-pills">
            <button [class.active]="kicksInUnit === 'Days'" (click)="kicksInUnit = 'Days'">Days</button>
            <button [class.active]="kicksInUnit === 'Month'" (click)="kicksInUnit = 'Month'">Month</button>
          </div>
        </div>
        <div class="field">
          <label>Apply penalty to</label>
          <select [(ngModel)]="applyTo">
            <option>Interest</option>
            <option>Principal</option>
            <option>Principal + Interest</option>
          </select>
        </div>
      </div>
    </div>

    <button class="add-btn" (click)="submit()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 3v10M3 8h10" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      Add new penalty
    </button>
  </div>
</div>
}
