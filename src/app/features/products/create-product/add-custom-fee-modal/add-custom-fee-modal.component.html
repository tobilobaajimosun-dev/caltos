@if (isOpen) {
<div class="backdrop" (click)="close()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-head">
      <h2 class="modal-title">Add a custom fee</h2>
      <button class="close-btn" (click)="close()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M15 5L5 15M5 5l10 10" stroke="#44444B" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <p class="modal-sub">Add your own custom fees to this loan product.</p>

    <div class="form-stack">
      <div class="field">
        <label>Fee name</label>
        <input [(ngModel)]="name" placeholder="e.g. Admin Fees" />
      </div>
      <div class="field">
        <label>Percentage or flat fee</label>
        <select [(ngModel)]="method">
          <option>Fixed amount</option>
          <option>Percentage</option>
        </select>
      </div>
      <div class="field">
        <label>Amount</label>
        <input [(ngModel)]="amount" placeholder="₦0.00" />
      </div>
      <div class="field">
        <label>Apply this fee to:</label>
        <select [(ngModel)]="applyTo">
          <option>Interest</option>
          <option>Principal</option>
          <option>Principal + Interest</option>
        </select>
      </div>
    </div>

    <button class="add-btn" (click)="submit()">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="2" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/>
        <rect x="9" y="2" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/>
        <rect x="2" y="9" width="5" height="5" rx="1" stroke="white" stroke-width="1.3"/>
        <path d="M11.5 9v5M9 11.5h5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Add custom fee
    </button>
  </div>
</div>
}
