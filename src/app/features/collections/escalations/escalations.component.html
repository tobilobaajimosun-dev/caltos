<div class="page-header">
  <h1 class="page-title">Escalation Workflows</h1>
  <p class="page-subtitle">Track and route escalated collections cases.</p>
</div>

<div class="kpi-row">
  <app-kpi-card label="Active escalations" value="23" />
  <app-kpi-card label="Legal stage" value="4" />
  <app-kpi-card label="Resolved this month" value="11" />
</div>

<div class="panel table-panel">
  <div class="panel-head">
    <p class="panel-title">Escalated cases</p>
  </div>
  <table class="ref-table">
    <thead>
      <tr>
        <th><app-column-title label="Customer" /></th>
        <th><app-column-title label="Stage" /></th>
        <th><app-column-title label="Amount" /></th>
        <th><app-column-title label="Assigned to" /></th>
        <th><app-column-title label="Status" /></th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows; track row.customer.email) {
        <tr>
          <td><app-table-item type="user-avatar" [user]="row.customer" /></td>
          <td><app-table-item type="text" [text]="row.stage" /></td>
          <td><app-table-item type="amount" [amount]="row.amount" /></td>
          <td><app-table-item type="text" [text]="row.assignedTo" /></td>
          <td><app-status-badge [status]="row.status" /></td>
        </tr>
      }
    </tbody>
  </table>
</div>
