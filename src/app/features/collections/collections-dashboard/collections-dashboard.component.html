<div class="page-header">
  <h1 class="page-title">Collections</h1>
  <p class="page-subtitle">Monitor overdue accounts and collections performance.</p>
</div>

<div class="kpi-row">
  <app-kpi-card label="Total overdue" value="₦1.4M" />
  <app-kpi-card label="Overdue accounts" value="81" />
  <app-kpi-card label="Recovery rate (30d)" value="76.3%" />
  <app-kpi-card label="Avg. days overdue" value="19" />
</div>

<div class="panel">
  <div class="panel-head">
    <p class="panel-title">Overdue by age bucket</p>
  </div>
  <app-chart type="bar" [data]="overdueByAge" color="var(--color-error)" />
</div>

<div class="panel table-panel">
  <div class="panel-head">
    <p class="panel-title">Most overdue accounts</p>
  </div>
  <table class="ref-table">
    <thead>
      <tr>
        <th><app-column-title label="Customer" /></th>
        <th><app-column-title label="Product" /></th>
        <th><app-column-title label="Days overdue" /></th>
        <th><app-column-title label="Amount" /></th>
        <th><app-column-title label="Status" /></th>
      </tr>
    </thead>
    <tbody>
      @for (row of topOverdue; track row.customer.email) {
        <tr>
          <td><app-table-item type="user-avatar" [user]="row.customer" /></td>
          <td><app-table-item type="text" [text]="row.product" /></td>
          <td><app-table-item type="text" [text]="row.daysOverdue + ' days'" /></td>
          <td><app-table-item type="amount" [amount]="row.amount" /></td>
          <td><app-status-badge [status]="row.status" /></td>
        </tr>
      }
    </tbody>
  </table>
</div>
