<div class="page-header">
  <h1 class="page-title">Reports & Exports</h1>
  <p class="page-subtitle">Generate and export performance and portfolio reports.</p>
</div>

<div class="report-grid">
  @for (report of reports; track report.title) {
    <div class="report-card">
      <div class="report-card-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <p class="report-card-title">{{ report.title }}</p>
      <p class="report-card-desc">{{ report.description }}</p>
      <button class="generate-btn" type="button">Generate report</button>
    </div>
  }
</div>
